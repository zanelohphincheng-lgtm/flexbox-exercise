<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Medium Gallery</title>
        <style>
            .text{
                font-family: Arial, Helvetica, sans-serif;
                text-align: center;
                margin: 0;
                padding-top: 50px;
            }
            .pic{
                display: flex;
                justify-content: space-between;
                flex-wrap: wrap;
                padding: 20px;
                max-width: 1400px;
                margin: 0 auto;
            }
            .pic-img{
                margin: 10px;
                border-radius: 5px;
            }
        </style>
    </head>
    <body>
        <div class="text">
        <h1>My Photo Gallery</h1>
        <p>Gallery made with flexbox.</p>
            <div class="pic">
                <div class="pic-img">
                    <img src="https://placehold.co/150x150" alt="Photo 1">
                    <img src="https://placehold.co/150x150" alt="Photo 2">
                    <img src="https://placehold.co/150x150" alt="Photo 3">
                    <img src="https://placehold.co/150x150" alt="Photo 4">
                    <img src="https://placehold.co/150x150" alt="Photo 5">
                    <img src="https://placehold.co/150x150" alt="Photo 6">
                    <img src="https://placehold.co/150x150" alt="Photo 7">
                    <img src="https://placehold.co/150x150" alt="Photo 8">
                    <img src="https://placehold.co/150x150" alt="Photo 9">
                    <img src="https://placehold.co/150x150" alt="Photo 10">
                </div>
            </div>
        </div>
    </body>
</html>
